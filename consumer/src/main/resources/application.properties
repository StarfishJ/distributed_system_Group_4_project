server.port=8081

# Graceful shutdown: wait for in-flight messages before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging
logging.level.consumer=INFO
logging.level.org.springframework.amqp=INFO

# RabbitMQ connection - set to RabbitMQ EC2 instance IP for production
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Listener thread pool - Tuning targets for Assignment 2
# Set via: -Dspring.rabbitmq.listener.simple.concurrency=X
spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=20

# Prefetch: Tuning target for Assignment 2
# Set via: -Dspring.rabbitmq.listener.simple.prefetch=X
spring.rabbitmq.listener.simple.prefetch=1

# Acknowledge mode must stay MANUAL (set via @RabbitListener ackMode)
# spring.rabbitmq.listener.simple.acknowledge-mode=manual

# Health endpoint - ALB checks GET /health (path configured in ALB target group)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never

# Circuit Breaker for RabbitMQ publish in ConsumerWebSocketHandler
resilience4j.circuitbreaker.instances.rabbitmq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbitmq.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbitmq.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.rabbitmq.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rabbitmq.permitted-number-of-calls-in-half-open-state=3
