server.port=8081

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

logging.level.consumer=INFO
logging.level.org.springframework.amqp=WARN

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

spring.rabbitmq.listener.simple.concurrency=20
spring.rabbitmq.listener.simple.max-concurrency=20
spring.rabbitmq.listener.simple.prefetch=1

# PostgreSQL (Assignment 3)
# rewriteBatchedInserts=true: ~2-3x faster batch inserts (driver rewrites to multi-row INSERT)
spring.datasource.url=jdbc:postgresql://localhost:5432/chatdb?rewriteBatchedInserts=true
spring.datasource.username=chat
spring.datasource.password=chat
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Batch tuning - Assignment 3 Part 2 (optimal from run-batch-optimization.ps1)
consumer.batch-size=1000
consumer.flush-interval-ms=100

# All rooms on one instance: *
# Multi-instance (partition 20 rooms across processes): e.g. 1-5, 6-10, 11-15, 16-20
consumer.rooms=*

# Backpressure: 0 = unlimited. When full, NACK requeue so RabbitMQ slows producers.
consumer.max-db-write-queue=200000
consumer.max-retry-batches=2000

# Error recovery (Part 2 Data Integrity)
consumer.consume-nack-max-retries=3
consumer.retry.max-attempts=5
consumer.retry.initial-delay-ms=1000
consumer.retry.multiplier=2
consumer.circuit-breaker.failure-threshold=5
consumer.circuit-breaker.open-duration-ms=30000

# Part 2: statistics aggregators thread pool (snapshot interval)
consumer.statistics-aggregator-interval-ms=5000

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never
