# CS6650 Assignment 3: PostgreSQL + RabbitMQ for local development
# Run: docker compose up -d
# Stop: docker compose down
# Fresh MQ (wipe broker data): docker compose down && docker compose up -d --force-recreate rabbitmq
#   or remove old container/volume if you used a named volume elsewhere.

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: chat-mq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: chatdb-pg
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chatdb
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    ports:
      - "5432:5432"
    volumes:
      - chatdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer-write:
    image: edoburu/pgbouncer:latest
    container_name: chat-pgbouncer-write
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: chat
      DB_PASSWORD: chat
      DB_HOST: postgres
      DB_NAME: chatdb
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
      ADMIN_USERS: chat
    ports:
      - "6432:5432"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer-read:
    image: edoburu/pgbouncer:latest
    container_name: chat-pgbouncer-read
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USER: chat
      DB_PASSWORD: chat
      DB_HOST: postgres
      DB_NAME: chatdb
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      AUTH_TYPE: md5
      ADMIN_USERS: chat
    ports:
      - "6433:5432"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  chatdb_data:
