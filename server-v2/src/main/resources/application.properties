# If 8080 is occupied, it can be changed to 8081 or started with --server.port=8081
server.port=8080

# Graceful shutdown: wait for in-flight messages before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# WebFlux/Netty thread pool configuration - increase thread count to handle high concurrent WebSocket
# Default is CPU core count, for high concurrent I/O-intensive tasks more threads are needed
spring.threads.virtual.enabled=false
# Netty event loop threads (default is CPU core count * 2)
# Set via system property: -Dreactor.netty.ioWorkerCount=32

# Broadcast: concurrency for receiving global messages from RabbitMQ
server.broadcast.concurrency=20
# false (default): anonymous queue on fanout chat.broadcast. true: durable queue on topic chat.broadcast.topic bound to srv.{sanitized-instance-id}; requires aligned consumer + Redis presence.
server.broadcast.targeted=true

# Logging
logging.level.server=INFO
logging.level.server.BroadcastListener=INFO
logging.level.org.springframework.web=INFO

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Channel pool (CachingConnectionFactory) - reuse channels instead of creating per-publish
spring.rabbitmq.cache.channel.size=200
spring.rabbitmq.cache.channel.checkout-timeout=2000

# Publisher confirms: detect silent message loss
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Circuit Breaker for RabbitMQ# Circuit breaker config
resilience4j.circuitbreaker.instances.rabbitmq.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbitmq.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbitmq.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.rabbitmq.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.rabbitmq.permitted-number-of-calls-in-half-open-state=3

# Health endpoint - ALB checks GET /health
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never

# PostgreSQL primary for Metrics API maintenance (MV refresh).
# Local default uses PgBouncer write endpoint on 6432 (backend: chatdb-pg:5432).
spring.datasource.url=jdbc:postgresql://127.0.0.1:6432/chatdb
spring.datasource.username=chat
spring.datasource.password=chat
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5

# Optional PostgreSQL read replica for /metrics SELECTs only (reduces contention with Consumer writes on primary).
# REFRESH MATERIALIZED VIEW always uses spring.datasource (primary). Replicas cannot run REFRESH.
server.metrics.read-replica.enabled=true
server.metrics.read-replica.jdbc-url=jdbc:postgresql://127.0.0.1:6433/chatdb
server.metrics.read-replica.username=chat
server.metrics.read-replica.password=chat
server.metrics.read-replica.maximum-pool-size=5

# Metrics API: cache full JSON payload — short TTL, stale OK for analytics
server.metrics.cache-ttl-seconds=30
server.metrics.cache-max-keys=64
# true: cache key is only room:* ; analytics fetched with max(topN, analytics-cache-wide-topn), then trimmed in-memory (Redis-friendly)
server.metrics.cache-coarse-by-room=true
server.metrics.analytics-cache-wide-topn=128

# Periodic MV refresh. Cron: second minute hour day-of-month month day-of-week (Spring 6-field).
server.metrics.scheduled-mv-refresh-enabled=true
server.metrics.scheduled-mv-refresh-cron=0 0 0/6 * * ?

# When false, GET /metrics?refreshMaterializedViews=true returns 403 (mitigates accidental heavy REFRESH via public ALB).
# Kubernetes manifests set this to false; local dev defaults true for convenience.
server.metrics.allow-http-mv-refresh=true

# --- Redis (metrics JSON cache + room presence). Start Redis locally when enabling.
server.redis.enabled=true
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=
# Unique per replica in K8s/EC2 for presence SET members (default: hostname+random)
# server.instance-id=server-v2-a
server.presence.key-ttl-minutes=10
# Heartbeat interval when server.redis.enabled=true (refreshes presence SET + TTL)
server.presence.heartbeat-interval-ms=60000
