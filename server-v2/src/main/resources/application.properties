# If 8080 is occupied, it can be changed to 8081 or started with --server.port=8081
server.port=8080

# Graceful shutdown: wait for in-flight messages before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# WebFlux/Netty thread pool configuration - increase thread count to handle high concurrent WebSocket
# Default is CPU core count, for high concurrent I/O-intensive tasks more threads are needed
spring.threads.virtual.enabled=false
# Netty event loop threads (default is CPU core count * 2)
# Set via system property: -Dreactor.netty.ioWorkerCount=32

# Logging
logging.level.server=DEBUG
logging.level.org.springframework.web=INFO

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Channel pool (CachingConnectionFactory) - reuse channels instead of creating per-publish
spring.rabbitmq.cache.channel.size=50
spring.rabbitmq.cache.channel.checkout-timeout=1000

# Publisher confirms: detect silent message loss
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true

# Circuit Breaker for RabbitMQ (queue unavailability)
resilience4j.circuitbreaker.instances.rabbitmq.failure-rate-threshold=80
resilience4j.circuitbreaker.instances.rabbitmq.sliding-window-size=20
resilience4j.circuitbreaker.instances.rabbitmq.minimum-number-of-calls=20
resilience4j.circuitbreaker.instances.rabbitmq.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.rabbitmq.permitted-number-of-calls-in-half-open-state=5

# Listener (consumer side) - for ServerMessageConsumer
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.prefetch=10
