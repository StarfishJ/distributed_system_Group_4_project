# Loaded by run-http-via-alb.ps1 via -q (additional JMeter properties).
# Goals: steadier HttpClient4 pooling, longer-lived keep-alive, light retry on flaky connects.

# Connect 失败时 retry=1 会让同一采样约等于「两次 connect_timeout」，JTL 里常见 ~30000ms 总耗时。
# 追求更低错误率时可改为 0（单次更长等待）；若网络极抖可改回 1。
httpclient4.retrycount=0

# Longer pooled connection lifetime (ms) toward one host (e.g. ALB DNS).
httpclient4.time_to_live=120000

# Re-check stale pooled sockets a bit less aggressively under load.
httpclient4.validate_after_inactivity=4000
